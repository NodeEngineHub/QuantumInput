name: Publish
on:
    release:
        types: [released, prereleased]
jobs:
    publish:
        name: Release build and publish
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: graalvm/setup-graalvm@v1
              with:
                  java-version: 25
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  distribution: 'graalvm-community'
                  cache: 'gradle'
            - uses: gradle/actions/setup-gradle@v5
            - name: Publish to MavenCentral
              run: |
                  TASKS=$(find . -name "build.gradle.kts" -not -path "*/build/*" | grep -E "(-api|-core)/build.gradle.kts$" | sed 's|^./||' | sed 's|/build.gradle.kts||' | awk -F'/' '{ if (NF == 1) print ":" $1 ":jreleaserDeploy"; else print ":" $2 ":" $3 ":jreleaserDeploy" }' | tr '\n' ' ')
                  ./gradlew $TASKS --no-configuration-cache
              env:
                  JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
                  JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
                  JRELEASER_GPG_KEYNAME: ${{ secrets.SIGNING_KEY_ID }}
                  JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
                  JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
                  JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_KEY_CONTENTS }}